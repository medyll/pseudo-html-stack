<!--
  @component dropdown-pk
  @layer molecules

  @prop {string} label - Default trigger button label when no `trigger` slot is provided
  @prop {boolean} [open] - Controls the open/closed state of the dropdown menu
  @prop {'left'|'right'} [align='left'] - Menu alignment relative to the trigger
  @prop {boolean} [disabled] - Disables the trigger button and prevents opening

  @slot trigger - Custom trigger element (replaces the default button)
  @slot items - Menu items; use `<menu-item-pk>` or `<li>` elements
-->
<template>
  <div class="dropdown">
    <button class="dropdown__trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
      <slot name="trigger">Options</slot>
      <span class="dropdown__arrow" aria-hidden="true">▾</span>
    </button>
    <ul class="dropdown__menu" role="listbox">
      <slot name="items"></slot>
    </ul>
  </div>
</template>

<style>
  @scope (.dropdown) {
    :scope {
      position: relative;
      display: inline-block;
    }

    .dropdown__trigger {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .45rem .9rem;
      background-color: var(--color-surface, #fff);
      border: 1px solid var(--color-border, #e2e8f0);
      border-radius: var(--radius-md, .375rem);
      font-size: var(--text-sm, .875rem);
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .dropdown__trigger:hover {
      border-color: var(--color-primary, #3b82f6);
    }
    .dropdown__trigger:focus-visible {
      outline: 2px solid var(--color-primary, #3b82f6);
      outline-offset: 2px;
    }
    .dropdown__trigger:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .dropdown__arrow {
      font-size: .7em;
      transition: transform .15s;
    }

    .dropdown__menu {
      position: absolute;
      top: calc(100% + .25rem);
      left: 0;
      z-index: var(--z-dropdown, 200);
      min-width: 12rem;
      margin: 0;
      padding: .25rem 0;
      list-style: none;
      background-color: var(--color-surface, #fff);
      border: 1px solid var(--color-border, #e2e8f0);
      border-radius: var(--radius-md, .375rem);
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      /* closed by default (fallback for no popover) */
      display: none;
    }

    :scope[align="right"] .dropdown__menu {
      left: auto;
      right: 0;
    }

    /* CSS-only open state (fallback when Popover API not supported) */
    :scope[open] .dropdown__menu { display: block; }
    :scope[open] .dropdown__arrow { transform: rotate(180deg); }

    /* Native Popover API state (Chrome 146+) */
    .dropdown__menu:popover-open { display: block; }
    :scope .dropdown__menu:popover-open ~ .dropdown__arrow { transform: rotate(180deg); }
  }
</style>

<script>
const trigger = el.querySelector('.dropdown__trigger');
const menu = el.querySelector('.dropdown__menu');
if (!trigger || !menu) return;

// Generate unique ID for this dropdown instance
const uid = `dd-${Math.random().toString(36).slice(2, 9)}`;

// Feature detection: Popover API support
const supportsPopover = 'popover' in HTMLElement.prototype;

if (supportsPopover) {
  // Popover API path (Chrome 146+, Firefox 128+)
  menu.popover = 'auto';
  menu.id = uid;
  trigger.popovertarget = uid;
  
  // Listen to toggle event and sync state
  menu.addEventListener('toggle', (e) => {
    const isOpen = e.newState === 'open';
    trigger.setAttribute('aria-expanded', isOpen);
    if (isOpen) {
      el.setAttribute('open', '');
    } else {
      el.removeAttribute('open');
    }
  });
  
  // Programmatic open/close via host [open] attribute
  const observer = new MutationObserver(() => {
    const shouldBeOpen = el.hasAttribute('open');
    const isOpen = menu.matches(':popover-open');
    if (shouldBeOpen && !isOpen) {
      menu.showPopover();
    } else if (!shouldBeOpen && isOpen) {
      menu.hidePopover();
    }
  });
  observer.observe(el, { attributes: true, attributeFilter: ['open'] });
} else {
  // Fallback: CSS-based toggle + manual JS
  trigger.addEventListener('click', (e) => {
    if (el.hasAttribute('open')) {
      el.removeAttribute('open');
      trigger.setAttribute('aria-expanded', 'false');
    } else {
      el.setAttribute('open', '');
      trigger.setAttribute('aria-expanded', 'true');
    }
  });
  
  // Click outside to close
  document.addEventListener('click', (e) => {
    if (el.hasAttribute('open') && !el.contains(e.target)) {
      el.removeAttribute('open');
      trigger.setAttribute('aria-expanded', 'false');
    }
  });
}

// Disable trigger if host has disabled attribute
if (el.hasAttribute('disabled')) {
  trigger.disabled = true;
}
</script>
