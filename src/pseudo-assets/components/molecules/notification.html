<!--
  @component notification-pk
  @layer molecules

  @prop {string} [message] - Notification text when no default slot is provided
  @prop {'info'|'success'|'warning'|'danger'} [variant='info'] - Colour/icon preset for the notification type
  @prop {boolean} [dismissible] - Shows a × button to dismiss the notification
  @prop {boolean} [icon] - Displays the variant icon on the left side

  @slot default - Custom notification body content (overrides `message` prop)
  @slot action - Inline action link or button placed after the message text
-->
<template>
  <div class="notification" role="alert">
    <span class="notification__icon" aria-hidden="true"></span>
    <div class="notification__content">
      <slot>Notification message</slot>
    </div>
    <div class="notification__action">
      <slot name="action"></slot>
    </div>
    <button class="notification__dismiss" type="button" aria-label="Dismiss">✕</button>
  </div>
</template>

<style>
  @keyframes pk-notif-dismiss {
    0% {
      opacity: 1;
      transform: translateY(0);
    }
    90% {
      opacity: 1;
      transform: translateY(0);
    }
    100% {
      opacity: 0;
      transform: translateY(-1rem);
    }
  }

  @scope (.notification) {
    :scope {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      padding: .875rem 1rem;
      border-radius: var(--radius-md, .375rem);
      border: 1px solid transparent;
      background-color: var(--color-surface-2, #f8fafc);
      font-size: var(--text-sm, .875rem);
    }

    /* Autodismiss animation */
    :scope[autodismiss] {
      animation: pk-notif-dismiss var(--dismiss-duration, 5s) ease-out forwards;
    }

    /* Pause animation on hover or focus-within */
    :scope[autodismiss]:hover,
    :scope[autodismiss]:focus-within {
      animation-play-state: paused;
    }

    /* Interest Invokers enhancement (Chrome 146+) */
    @supports selector(:interest) {
      :scope[autodismiss]:interest {
        animation-play-state: paused;
      }
    }

    /* Variants */
    :scope[variant="info"] {
      background-color: var(--color-info-light, #eff6ff);
      border-color: var(--color-info, #3b82f6);
      color: var(--color-info-dark, #1e40af);
    }
    :scope[variant="success"] {
      background-color: var(--color-success-light, #f0fdf4);
      border-color: var(--color-success, #22c55e);
      color: var(--color-success-dark, #15803d);
    }
    :scope[variant="warning"] {
      background-color: var(--color-warning-light, #fffbeb);
      border-color: var(--color-warning, #f59e0b);
      color: var(--color-warning-dark, #92400e);
    }
    :scope[variant="danger"] {
      background-color: var(--color-danger-light, #fef2f2);
      border-color: var(--color-danger, #ef4444);
      color: var(--color-danger-dark, #991b1b);
    }

    .notification__icon {
      flex-shrink: 0;
      font-size: 1rem;
      margin-top: .05rem;
    }
    :scope:not([icon]) .notification__icon { display: none; }
    :scope[variant="info"]    .notification__icon::before { content: 'ℹ'; }
    :scope[variant="success"] .notification__icon::before { content: '✓'; }
    :scope[variant="warning"] .notification__icon::before { content: '⚠'; }
    :scope[variant="danger"]  .notification__icon::before { content: '✕'; }

    .notification__content { flex: 1; }

    .notification__action { flex-shrink: 0; }
    .notification__action:empty { display: none; }

    .notification__dismiss {
      flex-shrink: 0;
      align-self: flex-start;
      background: none;
      border: none;
      cursor: pointer;
      font-size: .8rem;
      color: currentColor;
      opacity: .6;
      padding: .1rem;
      line-height: 1;
    }
    .notification__dismiss:hover { opacity: 1; }
    :scope:not([dismissible]) .notification__dismiss { display: none; }
  }
</style>

<script>
const notification = el.querySelector('.notification');
if (!notification) return;

// Handle dismiss button click
const dismissBtn = notification.querySelector('.notification__dismiss');
if (dismissBtn) {
  dismissBtn.addEventListener('click', () => {
    el.remove();
  });
}

// Handle animation end for autodismiss
if (el.hasAttribute('autodismiss')) {
  const onAnimationEnd = () => {
    el.remove();
  };
  notification.addEventListener('animationend', onAnimationEnd, { once: true });
  
  // If autodismiss is removed while animation is running, clean up listener
  const observer = new MutationObserver((mutations) => {
    for (const mutation of mutations) {
      if (mutation.type === 'attributes' && mutation.attributeName === 'autodismiss') {
        if (!el.hasAttribute('autodismiss')) {
          notification.removeEventListener('animationend', onAnimationEnd);
        }
      }
    }
  });
  observer.observe(el, { attributes: true, attributeFilter: ['autodismiss'] });
}
</script>
