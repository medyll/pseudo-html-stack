<!--
  @component slider-pk
  @layer atoms

  @prop {number} [min=0] - Minimum value
  @prop {number} [max=100] - Maximum value
  @prop {number} [step=1] - Step increment
  @prop {number} [value] - Current value (defaults to midpoint)
  @prop {string} [name] - Form field name
  @prop {boolean} [disabled] - Disable the control
  @prop {string} [label] - Accessible label text (aria-label)
  @prop {'default'|'primary'} [variant='default'] - Track/thumb color variant
-->
<template>
  <div class="slider">
    <input class="slider__input" type="range">
  </div>
</template>

<style>
  @scope (.slider) {
    :scope {
      display: block;
      width: 100%;
    }

    .slider__input {
      -webkit-appearance: none;
      appearance: none;
      display: block;
      width: 100%;
      height: 1.5rem;
      background: transparent;
      cursor: pointer;
      outline: none;
    }
    .slider__input:disabled { cursor: not-allowed; opacity: .5; }

    /* Track */
    .slider__input::-webkit-slider-runnable-track {
      height: .375rem;
      border-radius: var(--radius-full, 9999px);
      background: var(--color-surface-2, #e2e8f0);
    }
    .slider__input::-moz-range-track {
      height: .375rem;
      border-radius: var(--radius-full, 9999px);
      background: var(--color-surface-2, #e2e8f0);
    }

    /* Thumb */
    .slider__input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 1.125rem;
      height: 1.125rem;
      border-radius: 50%;
      background: var(--color-text-muted, #94a3b8);
      border: 2px solid var(--color-surface, #fff);
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      margin-top: -.375rem;
      transition: background .15s, transform .15s;
    }
    .slider__input::-moz-range-thumb {
      width: 1.125rem;
      height: 1.125rem;
      border-radius: 50%;
      background: var(--color-text-muted, #94a3b8);
      border: 2px solid var(--color-surface, #fff);
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      transition: background .15s, transform .15s;
    }
    .slider__input:hover:not(:disabled)::-webkit-slider-thumb { transform: scale(1.15); }
    .slider__input:hover:not(:disabled)::-moz-range-thumb     { transform: scale(1.15); }

    .slider__input:focus-visible {
      outline: 2px solid var(--color-primary, #3b82f6);
      outline-offset: 3px;
      border-radius: var(--radius-sm, .25rem);
    }

    /* Variant: primary */
    :scope[variant="primary"] .slider__input::-webkit-slider-runnable-track { background: color-mix(in oklch, var(--color-primary, #3b82f6) 25%, transparent); }
    :scope[variant="primary"] .slider__input::-moz-range-track              { background: color-mix(in oklch, var(--color-primary, #3b82f6) 25%, transparent); }
    :scope[variant="primary"] .slider__input::-webkit-slider-thumb { background: var(--color-primary, #3b82f6); }
    :scope[variant="primary"] .slider__input::-moz-range-thumb     { background: var(--color-primary, #3b82f6); }
  }
</style>

<script>
const input = el.querySelector('.slider__input');
if (!input) { el.setAttribute('data-ready', 'true'); return; }

const min   = el.getAttribute('min')   ?? '0';
const max   = el.getAttribute('max')   ?? '100';
const step  = el.getAttribute('step')  ?? '1';
const name  = el.getAttribute('name');
const label = el.getAttribute('label') || 'Slider';

input.setAttribute('min',  min);
input.setAttribute('max',  max);
input.setAttribute('step', step);
input.setAttribute('aria-label', label);

const val = el.getAttribute('value');
input.setAttribute('value', val !== null ? val : String((parseFloat(min) + parseFloat(max)) / 2));

if (name) input.setAttribute('name', name);
if (el.hasAttribute('disabled')) input.setAttribute('disabled', '');

el.setAttribute('data-ready', 'true');
</script>
