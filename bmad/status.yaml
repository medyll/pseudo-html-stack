decisions:
  - pkg_structure: "pseudo-kit-assets as separate npm package"
  - naming: "component files use -pk suffix to match their tag name (e.g. button-pk.html → <button-pk>)"
  - auto_register: false
  - css_strategy: "@scope on every style block"
  - breakpoints: "320 / 768 / 1024 / 1440px (mobile-first)"
  - slots: "default + named slots in all components"
  - frames: "empty skeletons — no placeholder content"
  - viewer: "pseudo-canvas-viewer.html — Figma-style, drag-and-drop + ?canvas= + ?assets=auto"
  - tokens_css: "per demo — not in the package"
  - barrel_meta: "index.js: components + frames URLs + componentsMeta + framesMeta"
  - ssr_marker: "data-pk-hydrated on each SSR-rendered component root"

