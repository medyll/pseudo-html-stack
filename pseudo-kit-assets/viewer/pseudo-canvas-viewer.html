<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pseudo-canvas-viewer</title>
  <style>
    /* ── Reset & tokens ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #1a1a2e;
      --bg-2:         #16213e;
      --bg-3:         #0f3460;
      --surface:      #1e1e2e;
      --surface-2:    #2a2a3e;
      --border:       rgba(255,255,255,.08);
      --text:         #e0e0f0;
      --text-muted:   #888aaa;
      --accent:       #7c3aed;
      --accent-2:     #a78bfa;
      --green:        #22c55e;
      --yellow:       #f59e0b;
      --red:          #ef4444;
      --radius:       .5rem;
      --panel-left:   14rem;
      --panel-right:  18rem;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
    }

    body { height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Titlebar ───────────────────────────────────────────────── */
    .titlebar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: .75rem;
      height: 2.75rem;
      padding: 0 1rem;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    .titlebar__logo {
      font-weight: 800;
      font-size: .85rem;
      letter-spacing: -.02em;
      color: var(--accent-2);
    }
    .titlebar__logo span { color: var(--text-muted); font-weight: 400; }
    .titlebar__sep { width: 1px; height: 1rem; background: var(--border); }
    .titlebar__info { font-size: .75rem; color: var(--text-muted); }
    .titlebar__spacer { flex: 1; }
    .titlebar__btn {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .3rem .65rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: .75rem;
      cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .titlebar__btn:hover { background: var(--surface-2); border-color: var(--accent); }
    .titlebar__btn--accent { background: var(--accent); border-color: var(--accent); }
    .titlebar__btn--accent:hover { background: var(--accent-2); }
    #file-input { display: none; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .viewer {
      flex: 1;
      display: grid;
      grid-template-columns: var(--panel-left) 1fr var(--panel-right);
      min-height: 0;
      overflow: hidden;
    }

    /* ── Left panel ─────────────────────────────────────────────── */
    .panel-left {
      display: flex;
      flex-direction: column;
      background: var(--bg-2);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .panel-left__search {
      flex-shrink: 0;
      padding: .5rem;
      border-bottom: 1px solid var(--border);
    }
    .panel-left__search input {
      width: 100%;
      padding: .35rem .6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .75rem;
      outline: none;
    }
    .panel-left__search input:focus { border-color: var(--accent); }
    .panel-left__search input::placeholder { color: var(--text-muted); }
    .tree { flex: 1; overflow-y: auto; padding: .25rem 0; }
    .tree::-webkit-scrollbar { width: 4px; }
    .tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .tree__group { }
    .tree__group-header {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .4rem .75rem .2rem;
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      cursor: pointer;
    }
    .tree__group-header:hover { color: var(--text); }
    .tree__group-arrow { font-size: .55rem; transition: transform .15s; }
    .tree__group.collapsed .tree__group-arrow { transform: rotate(-90deg); }
    .tree__group.collapsed .tree__items { display: none; }
    .tree__items { }
    .tree__item {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .3rem .75rem .3rem 1.25rem;
      font-size: .8rem;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 0;
      transition: background .1s, color .1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree__item:hover { background: var(--surface); color: var(--text); }
    .tree__item.active { background: var(--accent); color: #fff; }
    .tree__item-dot {
      width: .4rem;
      height: .4rem;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-muted);
    }
    .tree__item.active .tree__item-dot { background: #fff; }
    .layer-atoms    .tree__item-dot { background: var(--green); }
    .layer-molecules .tree__item-dot { background: var(--yellow); }
    .layer-organisms .tree__item-dot { background: var(--red); }
    .layer-frames   .tree__item-dot { background: var(--accent-2); }

    /* ── Center panel ───────────────────────────────────────────── */
    .panel-center {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }
    .canvas-toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .4rem .75rem;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
    }
    .viewport-btns { display: flex; gap: .25rem; }
    .vp-btn {
      padding: .25rem .55rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-muted);
      font-size: .7rem;
      cursor: pointer;
      transition: all .12s;
    }
    .vp-btn:hover { border-color: var(--accent); color: var(--text); }
    .vp-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .canvas-toolbar__spacer { flex: 1; }
    .canvas-toolbar__name {
      font-size: .8rem;
      font-weight: 600;
      color: var(--accent-2);
    }
    .canvas-toolbar__badge {
      font-size: .65rem;
      padding: .1rem .45rem;
      border-radius: 9999px;
      background: var(--surface-2);
      color: var(--text-muted);
    }
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 1.5rem;
      gap: 1rem;
      background:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,.04) 1px, transparent 0)
        0 0 / 20px 20px;
    }
    .canvas-frame {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
      overflow: hidden;
      transition: width .2s, height .2s;
      display: flex;
      flex-direction: column;
    }
    .canvas-frame--component {
      width: 480px;
      min-height: 160px;
      height: auto;
    }
    .canvas-frame--frame-type {
      width: 1280px;
      min-height: 720px;
    }
    .canvas-frame__vp-label {
      flex-shrink: 0;
      padding: .25rem .75rem;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-size: .65rem;
      color: #64748b;
      font-family: monospace;
    }
    .canvas-frame iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      min-height: 120px;
    }
    .canvas-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
      color: var(--text-muted);
    }
    .canvas-empty__icon { font-size: 3rem; opacity: .3; }
    .canvas-empty__title { font-size: 1rem; font-weight: 600; color: var(--text); }
    .canvas-empty__hint { font-size: .8rem; max-width: 24rem; line-height: 1.5; }

    /* Drop zone overlay */
    body.drag-over::after {
      content: 'Drop .html component or canvas file';
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(124,58,237,.85);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      pointer-events: none;
    }

    /* ── Right panel ────────────────────────────────────────────── */
    .panel-right {
      display: flex;
      flex-direction: column;
      background: var(--bg-2);
      border-left: 1px solid var(--border);
      overflow: hidden;
    }
    .panel-right__tabs {
      flex-shrink: 0;
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .rtab {
      flex: 1;
      padding: .6rem;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: .75rem;
      cursor: pointer;
      transition: color .12s, border-color .12s;
    }
    .rtab:hover { color: var(--text); }
    .rtab.active { color: var(--accent-2); border-bottom-color: var(--accent-2); }
    .panel-right__body { flex: 1; overflow-y: auto; padding: .75rem; }
    .panel-right__body::-webkit-scrollbar { width: 4px; }
    .panel-right__body::-webkit-scrollbar-thumb { background: var(--border); }

    .info-section { margin-bottom: 1.25rem; }
    .info-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: .4rem;
    }
    .info-value {
      font-size: .8rem;
      color: var(--text);
      line-height: 1.5;
      word-break: break-all;
    }
    .prop-row {
      display: flex;
      flex-direction: column;
      gap: .1rem;
      padding: .35rem .5rem;
      border-radius: .25rem;
      background: var(--surface);
      margin-bottom: .3rem;
      font-size: .75rem;
    }
    .prop-name { color: var(--accent-2); font-weight: 600; font-family: monospace; }
    .prop-type { color: var(--text-muted); font-family: monospace; }
    .slot-chip {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 9999px;
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: .7rem;
      margin: .15rem .15rem 0 0;
      font-family: monospace;
    }
    pre.source-code {
      font-size: .7rem;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      white-space: pre-wrap;
      word-break: break-all;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .75rem;
      color: var(--text);
      line-height: 1.55;
      overflow-x: auto;
    }
    .no-selection {
      color: var(--text-muted);
      font-size: .8rem;
      text-align: center;
      padding: 2rem .75rem;
      line-height: 1.6;
    }

    /* ── Resize handles ─────────────────────────────────────────── */
    .resize-handle {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      transition: background .15s;
      position: relative;
      z-index: 1;
    }
    .resize-handle:hover, .resize-handle.dragging { background: var(--accent); }

    /* ── Toast ──────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(4rem);
      background: var(--accent);
      color: #fff;
      padding: .5rem 1.25rem;
      border-radius: 9999px;
      font-size: .8rem;
      font-weight: 500;
      opacity: 0;
      transition: transform .25s, opacity .25s;
      pointer-events: none;
      z-index: 9999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (max-width: 900px) {
      :root { --panel-left: 0; --panel-right: 0; }
      .panel-left, .panel-right { display: none; }
      .viewer { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Titlebar ── -->
<header class="titlebar">
  <span class="titlebar__logo">pseudo<span>-canvas-viewer</span></span>
  <div class="titlebar__sep"></div>
  <span class="titlebar__info" id="asset-count">0 assets loaded</span>
  <div class="titlebar__spacer"></div>
  <button class="titlebar__btn" id="btn-auto" title="Load all assets from pseudo-kit-assets/index.js">
    ⚡ Load all assets
  </button>
  <label class="titlebar__btn" for="file-input" title="Open a .html file">
    📂 Open file
  </label>
  <input type="file" id="file-input" accept=".html" />
</header>

<!-- ── Main viewer ── -->
<div class="viewer" id="viewer">

  <!-- Left: asset tree -->
  <div class="panel-left" id="panel-left">
    <div class="panel-left__search">
      <input type="search" id="search-input" placeholder="Search assets…" autocomplete="off" />
    </div>
    <div class="tree" id="asset-tree">
      <div class="canvas-empty" style="padding:2rem .75rem;text-align:center">
        <div class="canvas-empty__icon">🧩</div>
        <div style="font-size:.75rem;color:var(--text-muted)">No assets loaded.<br>Click ⚡ or drag a file.</div>
      </div>
    </div>
  </div>

  <!-- Center: canvas -->
  <div class="panel-center" id="panel-center">
    <div class="canvas-toolbar">
      <span class="canvas-toolbar__name" id="canvas-name">—</span>
      <span class="canvas-toolbar__badge" id="canvas-layer"></span>
      <div class="canvas-toolbar__spacer"></div>
      <div class="viewport-btns">
        <button class="vp-btn" data-vp="320" title="Mobile 320px">📱</button>
        <button class="vp-btn" data-vp="768" title="Tablet 768px">📊</button>
        <button class="vp-btn active" data-vp="auto" title="Desktop / auto">🖥</button>
        <button class="vp-btn" data-vp="1280" title="Full HD">⬜</button>
      </div>
    </div>
    <div class="canvas-area" id="canvas-area">
      <div class="canvas-empty">
        <div class="canvas-empty__icon">🎨</div>
        <div class="canvas-empty__title">pseudo-canvas-viewer</div>
        <div class="canvas-empty__hint">
          Select a component from the left panel, drag &amp; drop a <code>.html</code> file,
          or add <code>?assets=auto</code> to the URL to load all 66 assets automatically.
        </div>
      </div>
    </div>
  </div>

  <!-- Right: info / source -->
  <div class="panel-right" id="panel-right">
    <div class="panel-right__tabs">
      <button class="rtab active" data-tab="props">Props</button>
      <button class="rtab" data-tab="slots">Slots</button>
      <button class="rtab" data-tab="source">Source</button>
    </div>
    <div class="panel-right__body" id="right-body">
      <p class="no-selection">Select an asset<br>to inspect it.</p>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
'use strict';

// ═══════════════════════════════════════════════════════
// RegistryParser — parse pseudo-kit-assets .html files
// ═══════════════════════════════════════════════════════
class RegistryParser {
  /** @param {string} html  raw component HTML source */
  static parse(html) {
    const meta = { name: '', props: '', slots: '', layer: '', description: '' };

    // Extract @-directives from the leading HTML comment
    const commentMatch = html.match(/<!--([\s\S]*?)-->/);
    if (commentMatch) {
      const block = commentMatch[1];
      const pick = (key) => {
        const m = block.match(new RegExp(`@${key}\\s+([^\\n@]+)`));
        return m ? m[1].trim() : '';
      };
      meta.name        = pick('component') || pick('frame');
      meta.props       = pick('props');
      meta.slots       = pick('slots');
      meta.layer       = pick('layer');
      meta.description = pick('description');
    }

    // Extract <template>, <style>, <script>
    const getTag = (tag) => {
      const m = html.match(new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`, 'i'));
      return m ? m[1] : '';
    };
    meta.template = getTag('template');
    meta.style    = getTag('style');
    meta.script   = getTag('script');
    meta.source   = html;

    return meta;
  }
}

// ═══════════════════════════════════════════════════════
// AssetLoader — fetches and registers assets
// ═══════════════════════════════════════════════════════
class AssetLoader {
  constructor() {
    /** @type {Map<string, object>} name → parsed meta + source */
    this.registry = new Map();
  }

  /** Load from pseudo-kit-assets/index.js dynamic import */
  async loadFromIndex(indexUrl) {
    const mod = await import(indexUrl);
    const { components = {}, frames = {}, componentsMeta = {}, framesMeta = {} } = mod;

    const allUrls = { ...components, ...frames };
    const allMeta = { ...componentsMeta, ...framesMeta };

    const promises = Object.entries(allUrls).map(async ([name, url]) => {
      try {
        const html = await fetch(url).then(r => r.text());
        const parsed = RegistryParser.parse(html);
        parsed.name  = parsed.name  || name;
        parsed.layer = parsed.layer || allMeta[name]?.layer || (name in frames ? 'frames' : 'atoms');
        // Merge metadata from index
        if (allMeta[name]) {
          parsed.props = parsed.props || allMeta[name].props || '';
          parsed.slots = parsed.slots || allMeta[name].slots || '';
        }
        this.registry.set(name, parsed);
      } catch (e) {
        console.warn(`[viewer] failed to load ${name}:`, e.message);
      }
    });

    await Promise.allSettled(promises);
    return this.registry;
  }

  /** Load a single .html file text */
  async loadFromText(html, filename) {
    const parsed = RegistryParser.parse(html);
    if (!parsed.name) parsed.name = filename.replace(/\.html$/, '');
    parsed.layer = parsed.layer || 'custom';
    this.registry.set(parsed.name, parsed);
    return parsed;
  }
}

// ═══════════════════════════════════════════════════════
// Renderer — builds iframe srcdoc for a component/frame
// ═══════════════════════════════════════════════════════
class Renderer {
  /** @param {object} asset  parsed asset from RegistryParser */
  static buildSrcdoc(asset) {
    const { template = '', style = '', layer } = asset;
    const isFrame = layer === 'frames';
    const bodyStyle = isFrame
      ? 'margin:0; padding:0;'
      : 'margin:2rem auto; max-width:640px; padding:1rem; font-family:system-ui,sans-serif;';

    return /* html */`<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { ${bodyStyle} }
    ${style}
  </style>
</head>
<body>
  ${template}
</body>
</html>`;
  }
}

// ═══════════════════════════════════════════════════════
// ViewerUI — manages the 3-panel interface
// ═══════════════════════════════════════════════════════
class ViewerUI {
  constructor(loader) {
    this.loader       = loader;
    this.selected     = null;
    this.activeTab    = 'props';
    this.searchQuery  = '';
    this.viewport     = 'auto';

    this.$tree        = document.getElementById('asset-tree');
    this.$canvasArea  = document.getElementById('canvas-area');
    this.$canvasName  = document.getElementById('canvas-name');
    this.$canvasLayer = document.getElementById('canvas-layer');
    this.$rightBody   = document.getElementById('right-body');
    this.$count       = document.getElementById('asset-count');
    this.$search      = document.getElementById('search-input');
    this.$toast       = document.getElementById('toast');

    this._bind();
  }

  _bind() {
    // Viewport buttons
    document.querySelectorAll('.vp-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.vp-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.viewport = btn.dataset.vp;
        if (this.selected) this._renderPreview(this.selected);
      });
    });

    // Right tabs
    document.querySelectorAll('.rtab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.activeTab = btn.dataset.tab;
        if (this.selected) this._renderRightPanel(this.selected);
      });
    });

    // Search
    this.$search.addEventListener('input', () => {
      this.searchQuery = this.$search.value.toLowerCase();
      this.renderTree();
    });
  }

  toast(msg) {
    this.$toast.textContent = msg;
    this.$toast.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => this.$toast.classList.remove('show'), 2500);
  }

  renderTree() {
    const registry = this.loader.registry;
    if (!registry.size) {
      this.$tree.innerHTML = `<div class="canvas-empty" style="padding:2rem .75rem;text-align:center">
        <div class="canvas-empty__icon">🧩</div>
        <div style="font-size:.75rem;color:var(--text-muted)">No assets loaded.<br>Click ⚡ or drag a file.</div>
      </div>`;
      this.$count.textContent = '0 assets loaded';
      return;
    }

    // Group by layer
    const groups = {};
    const layerOrder = ['atoms', 'molecules', 'organisms', 'frames', 'custom'];
    for (const [name, asset] of registry) {
      const layer = asset.layer || 'custom';
      if (!groups[layer]) groups[layer] = [];
      groups[layer].push({ name, asset });
    }

    const q = this.searchQuery;
    let html = '';
    for (const layer of layerOrder) {
      if (!groups[layer]) continue;
      const items = q
        ? groups[layer].filter(({ name }) => name.includes(q))
        : groups[layer];
      if (!items.length) continue;

      const label = { atoms: '⚛ Atoms', molecules: '🔬 Molecules', organisms: '🦠 Organisms', frames: '🖼 Frames', custom: '📄 Custom' }[layer] || layer;
      html += `<div class="tree__group layer-${layer}" data-layer="${layer}">
        <div class="tree__group-header">
          <span class="tree__group-arrow">▾</span>
          ${label}
          <span style="margin-left:auto;opacity:.5;font-size:.65rem">${items.length}</span>
        </div>
        <div class="tree__items">`;
      for (const { name } of items) {
        const active = this.selected?.name === name ? ' active' : '';
        html += `<div class="tree__item${active}" data-name="${name}">
          <span class="tree__item-dot"></span>${name}
        </div>`;
      }
      html += `</div></div>`;
    }
    this.$tree.innerHTML = html;
    this.$count.textContent = `${registry.size} asset${registry.size > 1 ? 's' : ''} loaded`;

    // Events
    this.$tree.querySelectorAll('.tree__item').forEach(el => {
      el.addEventListener('click', () => {
        const asset = registry.get(el.dataset.name);
        if (asset) this.select(asset);
      });
    });
    this.$tree.querySelectorAll('.tree__group-header').forEach(el => {
      el.addEventListener('click', () => el.closest('.tree__group').classList.toggle('collapsed'));
    });
  }

  select(asset) {
    this.selected = asset;
    // Update tree highlight
    this.$tree.querySelectorAll('.tree__item').forEach(el => {
      el.classList.toggle('active', el.dataset.name === asset.name);
    });
    this._renderPreview(asset);
    this._renderRightPanel(asset);
  }

  _renderPreview(asset) {
    const vp = this.viewport;
    const isFrame = asset.layer === 'frames';
    const vpLabel = vp === 'auto' ? 'Desktop — fluid' : `${vp}px`;
    const frameClass = isFrame ? 'canvas-frame--frame-type' : 'canvas-frame--component';
    const frameW = vp === 'auto' ? (isFrame ? '1280px' : '480px') : `${vp}px`;
    const frameH = isFrame ? '720px' : 'auto';
    const srcdoc = Renderer.buildSrcdoc(asset).replace(/"/g, '&quot;');

    // Update titlebar
    this.$canvasName.textContent = asset.name;
    this.$canvasLayer.textContent = asset.layer || '';

    this.$canvasArea.innerHTML = `
      <div class="canvas-frame ${frameClass}" style="width:${frameW};${frameH !== 'auto' ? `height:${frameH}` : ''}">
        <div class="canvas-frame__vp-label">${asset.name} · ${vpLabel}</div>
        <iframe
          srcdoc="${srcdoc}"
          title="${asset.name} preview"
          sandbox="allow-scripts"
          loading="lazy"
          onload="this.style.height = this.contentDocument.body.scrollHeight + 'px'"
        ></iframe>
      </div>`;
  }

  _renderRightPanel(asset) {
    if (!asset) {
      this.$rightBody.innerHTML = `<p class="no-selection">Select an asset<br>to inspect it.</p>`;
      return;
    }

    if (this.activeTab === 'props') {
      if (!asset.props) {
        this.$rightBody.innerHTML = `<p class="no-selection">No props declared.</p>`;
        return;
      }
      const rows = asset.props.split(';').map(p => p.trim()).filter(Boolean).map(p => {
        const [nameType, ...rest] = p.split(':');
        const type = rest.join(':') || 'string';
        return `<div class="prop-row">
          <span class="prop-name">${nameType.trim()}</span>
          <span class="prop-type">${type.trim()}</span>
        </div>`;
      }).join('');
      this.$rightBody.innerHTML = `<div class="info-section">
        <div class="info-label">Component</div>
        <div class="info-value">${asset.name}</div>
      </div>
      <div class="info-section">
        <div class="info-label">Layer</div>
        <div class="info-value">${asset.layer || '—'}</div>
      </div>
      <div class="info-section">
        <div class="info-label">Props</div>
        ${rows}
      </div>`;

    } else if (this.activeTab === 'slots') {
      const slots = (asset.slots || '').split(',').map(s => s.trim()).filter(Boolean);
      const chips = slots.length
        ? slots.map(s => `<span class="slot-chip">${s}</span>`).join('')
        : '<span style="color:var(--text-muted);font-size:.75rem">No named slots</span>';
      this.$rightBody.innerHTML = `<div class="info-section">
        <div class="info-label">Slots</div>
        <div>${chips}</div>
      </div>
      ${asset.description ? `<div class="info-section">
        <div class="info-label">Description</div>
        <div class="info-value">${asset.description}</div>
      </div>` : ''}`;

    } else if (this.activeTab === 'source') {
      const escaped = (asset.source || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      this.$rightBody.innerHTML = `<pre class="source-code">${escaped}</pre>`;
    }
  }
}

// ═══════════════════════════════════════════════════════
// Bootstrap
// ═══════════════════════════════════════════════════════
const loader = new AssetLoader();
const ui     = new ViewerUI(loader);

/** Derive the index.js URL relative to this viewer file */
function indexUrl() {
  return new URL('../../index.js', import.meta.url).href;
}

/** Load all assets from index.js */
async function loadAll() {
  document.getElementById('btn-auto').textContent = '⏳ Loading…';
  try {
    await loader.loadFromIndex(indexUrl());
    ui.renderTree();
    ui.toast(`✅ ${loader.registry.size} assets loaded`);
  } catch (e) {
    ui.toast('❌ Failed to load assets: ' + e.message);
    console.error(e);
  }
  document.getElementById('btn-auto').textContent = '⚡ Reload assets';
}

// ── URL params ──────────────────────────────────────────
const params = new URLSearchParams(location.search);

if (params.has('assets') && params.get('assets') === 'auto') {
  loadAll();
}

if (params.has('canvas')) {
  (async () => {
    try {
      const html = await fetch(params.get('canvas')).then(r => r.text());
      const filename = params.get('canvas').split('/').pop();
      const asset = await loader.loadFromText(html, filename);
      ui.renderTree();
      ui.select(asset);
      ui.toast(`📄 Loaded ${filename}`);
    } catch (e) {
      ui.toast('❌ Cannot load canvas: ' + e.message);
    }
  })();
}

// ── Button: load all ────────────────────────────────────
document.getElementById('btn-auto').addEventListener('click', loadAll);

// ── File input ──────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const html = await file.text();
  const asset = await loader.loadFromText(html, file.name);
  ui.renderTree();
  ui.select(asset);
  ui.toast(`📄 Loaded ${file.name}`);
  e.target.value = '';
});

// ── Drag & drop ─────────────────────────────────────────
document.addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('drag-over'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) document.body.classList.remove('drag-over'); });
document.addEventListener('drop', async (e) => {
  e.preventDefault();
  document.body.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.html'));
  if (!files.length) { ui.toast('⚠️ Drop .html files only'); return; }
  for (const file of files) {
    const html = await file.text();
    await loader.loadFromText(html, file.name);
  }
  ui.renderTree();
  const last = loader.registry.get(files.at(-1).name.replace(/\.html$/, ''));
  if (last) ui.select(last);
  ui.toast(`📄 Loaded ${files.length} file${files.length > 1 ? 's' : ''}`);
});

// ── Resize handles (CSS panels) ─────────────────────────
(function initResize() {
  const viewer = document.getElementById('viewer');
  let dragging = null, startX = 0, startW = 0, side = '';

  function injectHandle(el, placement) {
    const h = document.createElement('div');
    h.className = 'resize-handle';
    h.dataset.side = placement;
    if (placement === 'left') viewer.insertBefore(h, el.nextSibling);
    else viewer.insertBefore(h, el);
    h.addEventListener('mousedown', (e) => {
      dragging = h;
      side = placement;
      startX = e.clientX;
      startW = parseInt(getComputedStyle(document.documentElement).getPropertyValue(`--panel-${placement}`));
      h.classList.add('dragging');
      e.preventDefault();
    });
  }
  injectHandle(document.getElementById('panel-left'),  'left');
  injectHandle(document.getElementById('panel-right'), 'right');

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const delta = side === 'left' ? e.clientX - startX : startX - e.clientX;
    const newW  = Math.max(100, Math.min(400, startW + delta));
    document.documentElement.style.setProperty(`--panel-${side}`, `${newW}px`);
  });
  document.addEventListener('mouseup', () => {
    if (dragging) { dragging.classList.remove('dragging'); dragging = null; }
  });
})();
</script>
