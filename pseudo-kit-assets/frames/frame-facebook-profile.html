<!--
  @frame facebook-profile
  @slots cover, profile, nav, content, sidebar
  @description User profile skeleton
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook Profile — Frame</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f2f5; font-family: system-ui, sans-serif; min-height: 100dvh; }
    .frame-facebook-profile { display: flex; flex-direction: column; min-height: 100dvh; }
    .frame__topbar  { position: sticky; top: 0; z-index: 100; }
    .frame__cover   { width: 100%; max-height: 28rem; overflow: hidden; background: #c9cdd4; }
    .frame__cover > * { width: 100%; height: 28rem; object-fit: cover; }
    .frame__profile-bar { background: #fff; border-bottom: 1px solid #e4e6eb; padding: 0 1rem; max-width: 1100px; margin: 0 auto; width: 100%; }
    .frame__profile-nav { }
    .frame__layout  { flex: 1; display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; max-width: 1100px; margin: 0 auto; width: 100%; padding: 1rem; }
    .frame__sidebar { display: flex; flex-direction: column; gap: 1rem; }
    .frame__content { display: flex; flex-direction: column; gap: 1rem; }
    @media (max-width: 768px) { .frame__layout { grid-template-columns: 1fr; } .frame__sidebar { display: none; } }
  </style>
</head>
<body>
  <div class="frame-facebook-profile">

    <div class="frame__topbar">
      <slot name="topbar"></slot>
    </div>

    <div class="frame__cover">
      <slot name="cover"></slot>
    </div>

    <div class="frame__profile-bar">
      <slot name="profile"></slot>
      <div class="frame__profile-nav">
        <slot name="nav"></slot>
      </div>
    </div>

    <div class="frame__layout">
      <div class="frame__sidebar">
        <slot name="sidebar"></slot>
      </div>
      <div class="frame__content">
        <slot name="content"></slot>
      </div>
    </div>

  </div>
</body>
</html>
