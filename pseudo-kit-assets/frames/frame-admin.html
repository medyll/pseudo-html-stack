<!--
  @frame admin
  @slots sidebar, topbar, breadcrumb, content, footer
  @description Admin panel skeleton
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Frame</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; font-family: system-ui, sans-serif; min-height: 100dvh; }
    .frame-admin     { display: flex; min-height: 100dvh; }
    .frame__sidebar  { width: 15rem; flex-shrink: 0; height: 100dvh; position: sticky; top: 0; overflow-y: auto; background: #1e293b; }
    .frame__body     { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .frame__topbar   { position: sticky; top: 0; z-index: 10; background: #fff; border-bottom: 1px solid #e2e8f0; }
    .frame__main     { flex: 1; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .frame__breadcrumb { }
    .frame__content  { flex: 1; background: #fff; border-radius: .75rem; border: 1px solid #e2e8f0; overflow: hidden; }
    .frame__footer   { padding: 1rem 1.5rem; border-top: 1px solid #e2e8f0; background: #fff; font-size: .75rem; color: #64748b; }
    @media (max-width: 768px) { .frame__sidebar { display: none; } }
  </style>
</head>
<body>
  <div class="frame-admin">

    <div class="frame__sidebar">
      <slot name="sidebar"></slot>
    </div>

    <div class="frame__body">
      <div class="frame__topbar">
        <slot name="topbar"></slot>
      </div>
      <div class="frame__main">
        <div class="frame__breadcrumb">
          <slot name="breadcrumb"></slot>
        </div>
        <div class="frame__content">
          <slot name="content"></slot>
        </div>
      </div>
      <div class="frame__footer">
        <slot name="footer"></slot>
      </div>
    </div>

  </div>
</body>
</html>
