<!--
  @frame amazon-cart
  @slots items, summary, recommendations
  @description Shopping cart skeleton
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Cart — Frame</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #eaeded; font-family: system-ui, sans-serif; min-height: 100dvh; }
    .frame-amazon-cart  { display: flex; flex-direction: column; min-height: 100dvh; }
    .frame__navbar      { position: sticky; top: 0; z-index: 100; }
    .frame__main        { flex: 1; max-width: 1280px; margin: 0 auto; width: 100%; padding: 1.5rem; display: grid; grid-template-columns: 1fr 22rem; gap: 1.5rem; align-items: flex-start; }
    .frame__items       { display: flex; flex-direction: column; gap: 1rem; background: #fff; border-radius: .5rem; padding: 1.5rem; }
    .frame__summary     { position: sticky; top: 5rem; }
    .frame__recommendations { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 1rem; }
    .frame__footer      { }
    @media (max-width: 768px) {
      .frame__main { grid-template-columns: 1fr; }
      .frame__summary { position: static; }
    }
  </style>
</head>
<body>
  <div class="frame-amazon-cart">

    <div class="frame__navbar">
      <slot name="navbar"></slot>
    </div>

    <div class="frame__main">
      <div class="frame__items">
        <slot name="items"></slot>
      </div>
      <div class="frame__summary">
        <slot name="summary"></slot>
      </div>
      <div class="frame__recommendations">
        <slot name="recommendations"></slot>
      </div>
    </div>

    <div class="frame__footer">
      <slot name="footer"></slot>
    </div>

  </div>
</body>
</html>
