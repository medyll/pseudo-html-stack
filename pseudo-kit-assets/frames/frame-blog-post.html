<!--
  @frame blog-post
  @slots navbar, header, body, sidebar, comments, footer
  @description Blog article skeleton
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post — Frame</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: system-ui, sans-serif; min-height: 100dvh; }
    .frame-blog-post { display: flex; flex-direction: column; min-height: 100dvh; }
    .frame__navbar   { position: sticky; top: 0; z-index: 100; }
    .frame__layout   { flex: 1; max-width: 1100px; margin: 0 auto; width: 100%; padding: 3rem 1.5rem; display: grid; grid-template-columns: 1fr 18rem; gap: 3rem; align-items: flex-start; }
    .frame__article  { display: flex; flex-direction: column; gap: 2rem; }
    .frame__header   { }
    .frame__body     { line-height: 1.7; }
    .frame__comments { padding-top: 2rem; border-top: 1px solid #e2e8f0; }
    .frame__sidebar  { position: sticky; top: 5rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .frame__footer   { }
    @media (max-width: 900px) { .frame__layout { grid-template-columns: 1fr; } .frame__sidebar { display: none; } }
  </style>
</head>
<body>
  <div class="frame-blog-post">

    <div class="frame__navbar">
      <slot name="navbar"></slot>
    </div>

    <div class="frame__layout">
      <article class="frame__article">
        <div class="frame__header">
          <slot name="header"></slot>
        </div>
        <div class="frame__body">
          <slot name="body"></slot>
        </div>
        <div class="frame__comments">
          <slot name="comments"></slot>
        </div>
      </article>
      <div class="frame__sidebar">
        <slot name="sidebar"></slot>
      </div>
    </div>

    <div class="frame__footer">
      <slot name="footer"></slot>
    </div>

  </div>
</body>
</html>
