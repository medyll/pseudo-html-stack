<!--
  @frame blog-home
  @slots navbar, hero, posts, sidebar, footer
  @description Blog listing skeleton
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Home — Frame</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: system-ui, sans-serif; min-height: 100dvh; }
    .frame-blog-home { display: flex; flex-direction: column; min-height: 100dvh; }
    .frame__navbar   { position: sticky; top: 0; z-index: 100; }
    .frame__hero     { }
    .frame__layout   { flex: 1; max-width: 1200px; margin: 0 auto; width: 100%; padding: 3rem 1.5rem; display: grid; grid-template-columns: 1fr 20rem; gap: 3rem; align-items: flex-start; }
    .frame__posts    { display: flex; flex-direction: column; gap: 2rem; }
    .frame__sidebar  { position: sticky; top: 5rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .frame__footer   { }
    @media (max-width: 900px) { .frame__layout { grid-template-columns: 1fr; } .frame__sidebar { display: none; } }
  </style>
</head>
<body>
  <div class="frame-blog-home">

    <div class="frame__navbar">
      <slot name="navbar"></slot>
    </div>

    <div class="frame__hero">
      <slot name="hero"></slot>
    </div>

    <div class="frame__layout">
      <div class="frame__posts">
        <slot name="posts"></slot>
      </div>
      <div class="frame__sidebar">
        <slot name="sidebar"></slot>
      </div>
    </div>

    <div class="frame__footer">
      <slot name="footer"></slot>
    </div>

  </div>
</body>
</html>
