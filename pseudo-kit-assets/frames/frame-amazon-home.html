<!--
  @frame amazon-home
  @slots navbar, hero, categories, featured, footer
  @description E-commerce home skeleton
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Home — Frame</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #eaeded; font-family: system-ui, sans-serif; min-height: 100dvh; }
    .frame-amazon-home { display: flex; flex-direction: column; min-height: 100dvh; }
    .frame__navbar      { position: sticky; top: 0; z-index: 100; }
    .frame__hero        { width: 100%; }
    .frame__main        { flex: 1; max-width: 1500px; margin: 0 auto; width: 100%; padding: 1rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .frame__categories  { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    @media (max-width: 768px) { .frame__categories { grid-template-columns: repeat(2, 1fr); } }
    .frame__featured    { display: flex; flex-direction: column; gap: 1rem; }
    .frame__footer      { }
  </style>
</head>
<body>
  <div class="frame-amazon-home">

    <div class="frame__navbar">
      <slot name="navbar"></slot>
    </div>

    <div class="frame__hero">
      <slot name="hero"></slot>
    </div>

    <div class="frame__main">
      <div class="frame__categories">
        <slot name="categories"></slot>
      </div>
      <div class="frame__featured">
        <slot name="featured"></slot>
      </div>
    </div>

    <div class="frame__footer">
      <slot name="footer"></slot>
    </div>

  </div>
</body>
</html>
