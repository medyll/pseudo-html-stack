<!--
  @component modal-pk
  @props title:string?; open:boolean?; size:enum(sm|md|lg|fullscreen)?; closeable:boolean?
  @slots default, header, footer
  @layer molecules
-->
<template>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal__backdrop"></div>
    <div class="modal__container">
      <div class="modal__header">
        <slot name="header">
          <span class="modal__title" id="modal-title">Modal</span>
        </slot>
        <button class="modal__close" type="button" aria-label="Close">✕</button>
      </div>
      <div class="modal__body">
        <slot>Modal content</slot>
      </div>
      <div class="modal__footer">
        <slot name="footer"></slot>
      </div>
    </div>
  </div>
</template>

<style>
  @scope (.modal) {
    :scope {
      display: none;
      position: fixed;
      inset: 0;
      z-index: var(--z-modal, 500);
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    :scope[open] { display: flex; }

    .modal__backdrop {
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, .5);
    }

    .modal__container {
      position: relative;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 32rem;
      max-height: calc(100dvh - 2rem);
      background-color: var(--color-surface, #fff);
      border-radius: var(--radius-xl, .75rem);
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      overflow: hidden;
    }

    :scope[size="sm"] .modal__container { max-width: 20rem; }
    :scope[size="lg"] .modal__container { max-width: 48rem; }
    :scope[size="fullscreen"] .modal__container {
      max-width: 100%;
      max-height: 100dvh;
      border-radius: 0;
    }

    .modal__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--color-border, #e2e8f0);
    }

    .modal__title {
      font-size: var(--text-lg, 1.125rem);
      font-weight: 600;
      color: var(--color-text, #1a202c);
    }

    .modal__close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border: none;
      border-radius: var(--radius-sm, .25rem);
      background: transparent;
      color: var(--color-text-muted, #64748b);
      cursor: pointer;
      font-size: .875rem;
      transition: background-color .12s;
      flex-shrink: 0;
    }
    .modal__close:hover { background-color: var(--color-surface-2, #f1f5f9); }

    :scope:not([closeable]) .modal__close { display: none; }

    .modal__body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
    }

    .modal__footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: .5rem;
      padding: .75rem 1.25rem;
      border-top: 1px solid var(--color-border, #e2e8f0);
    }
    .modal__footer:empty { display: none; }
  }
</style>
